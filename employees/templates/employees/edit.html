<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

<h2>Edit Employee</h2>

<form method="POST" class="card p-4 shadow">
    {% csrf_token %}

    <input type="text" name="name" value="{{ emp.name }}" class="form-control mb-3">
    <input type="email" name="email" value="{{ emp.email }}" class="form-control mb-3">
    <input type="text" name="department" value="{{ emp.department }}" class="form-control mb-3">
    <input type="text" name="location" value="{{ emp.location }}" class="form-control mb-3">

    <button class="btn btn-primary">Update</button>
</form>

</div>
</body>
</html>
