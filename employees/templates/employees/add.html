<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Add Employee</h2>

    <form method="POST" class="card p-4 shadow">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Name" class="form-control mb-3" required>
        <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>
        <input type="text" name="department" placeholder="Department" class="form-control mb-3" required>
        <input type="text" name="location" placeholder="Location" class="form-control mb-3" required>

        <button type="submit" class="btn btn-primary w-100">Add Employee</button>
    </form>
</div>

</body>
</html>
